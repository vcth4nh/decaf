name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: uv sync
      - run: uv run pytest
